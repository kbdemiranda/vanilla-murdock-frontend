<!doctype html>
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Nelson, Murdock &amp; Page</title>
  <meta name="description" content="">
  <meta property="og:title" content="Nelson, Murdock &amp; Page">
  <meta property="og:description" content="">
  <meta property="og:type" content="website">
  <link rel="canonical" href="/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Manrope', 'sans-serif'],
            serif: ['Playfair Display', 'serif']
          },
          colors: {
            brand: {
              navy: '#0B1F3B',
              gold: '#C8A24A'
            }
          },
          boxShadow: {
            card: '0 10px 28px rgba(11,31,59,0.08)'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-stone-50 text-slate-800 antialiased transition-colors dark:bg-slate-950 dark:text-slate-100">
  <a id="skip-link" class="sr-only focus:not-sr-only focus:fixed focus:left-4 focus:top-4 focus:z-[100] focus:rounded-lg focus:bg-brand-navy focus:px-4 focus:py-2 focus:text-white" href="#main">Skip to content</a>

  <header class="sticky top-0 z-40 border-b border-slate-200/80 bg-white/90 backdrop-blur-md transition-colors dark:border-slate-800 dark:bg-slate-950/90" role="banner">
    <div class="mx-auto flex w-full max-w-6xl items-center justify-between gap-3 px-4 py-3 lg:px-8">
      <a href="#hero" class="text-sm font-semibold text-brand-navy transition-colors dark:text-slate-100 md:text-base" data-scroll>Nelson, Murdock &amp; Page</a>
      <nav id="main-nav" class="hidden lg:block" aria-label="Main navigation">
        <ul class="flex items-center gap-1 text-sm font-medium text-slate-600 dark:text-slate-300">
          <li><a href="#hero" class="site-nav-link rounded-lg px-3 py-2 transition hover:bg-slate-100 hover:text-brand-navy dark:hover:bg-slate-800 dark:hover:text-white" data-nav="home">Home</a></li>
          <li><a href="#areas" class="site-nav-link rounded-lg px-3 py-2 transition hover:bg-slate-100 hover:text-brand-navy dark:hover:bg-slate-800 dark:hover:text-white" data-nav="areas">Practice Areas</a></li>
          <li><a href="#why-us" class="site-nav-link rounded-lg px-3 py-2 transition hover:bg-slate-100 hover:text-brand-navy dark:hover:bg-slate-800 dark:hover:text-white" data-nav="why">Why Us</a></li>
          <li><a href="#testimonials" class="site-nav-link rounded-lg px-3 py-2 transition hover:bg-slate-100 hover:text-brand-navy dark:hover:bg-slate-800 dark:hover:text-white" data-nav="testimonials">Testimonials</a></li>
          <li><a href="#contact" class="site-nav-link rounded-lg px-3 py-2 transition hover:bg-slate-100 hover:text-brand-navy dark:hover:bg-slate-800 dark:hover:text-white" data-nav="contact">Contact</a></li>
        </ul>
      </nav>
      <div class="flex shrink-0 items-center gap-3">
        <button id="themeToggle" type="button" class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-semibold text-slate-700 transition hover:border-slate-400 hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-100 dark:hover:border-slate-600 dark:hover:bg-slate-800" aria-pressed="false" aria-label="Alternar tema" title="Alternar tema">
          <i id="themeToggleIcon" class="fa-regular fa-moon"></i>
        </button>
        <label class="flex items-center gap-2 text-sm font-semibold text-slate-600 dark:text-slate-300" for="languageSelect">
        <span id="language-label">Language</span>
        <select id="languageSelect" class="rounded-lg border border-slate-300 bg-white px-2 py-2 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-brand-gold/50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-100">
          <option value="en">EN</option>
          <option value="ptBR">PT-BR</option>
          <option value="esLATAM">ES</option>
        </select>
        </label>
      </div>
    </div>
  </header>

  <main id="main">
    <section id="hero" class="relative overflow-hidden border-b border-slate-200 bg-gradient-to-br from-white via-stone-50 to-amber-50/60 py-16 transition-colors dark:border-slate-800 dark:from-slate-950 dark:via-slate-900 dark:to-slate-900 lg:py-20">
      <div class="mx-auto grid w-full max-w-6xl gap-8 px-4 lg:grid-cols-[minmax(0,1fr)_minmax(320px,400px)] lg:gap-12 lg:px-8">
        <div>
          <h1 id="hero-headline" class="font-serif text-3xl font-bold leading-tight text-brand-navy dark:text-slate-100 sm:text-4xl lg:text-5xl"></h1>
          <p id="hero-subheadline" class="mt-4 max-w-2xl text-base text-slate-600 dark:text-slate-300 lg:text-lg"></p>
          <div class="mt-7 flex flex-wrap gap-3">
            <a id="hero-primary-cta" href="#contact" class="rounded-xl bg-brand-navy px-5 py-3 text-sm font-semibold text-white transition hover:opacity-95 whitespace-normal text-center" data-scroll></a>
            <a id="hero-secondary-cta" href="#contact" class="rounded-xl border border-brand-navy/20 bg-white px-5 py-3 text-sm font-semibold text-brand-navy transition hover:border-brand-navy/40 whitespace-normal text-center dark:border-slate-700 dark:bg-slate-900 dark:text-slate-100" data-scroll></a>
          </div>
        </div>

        <div class="rounded-3xl bg-gradient-to-br from-brand-navy to-slate-900 p-7 text-white shadow-card lg:p-9">
          <p id="hero-aside-kicker" class="text-xs font-semibold uppercase tracking-[0.2em] text-brand-gold"></p>
          <p id="hero-aside-headline" class="mt-5 text-2xl font-serif leading-tight lg:text-3xl"></p>
          <div class="mt-7 grid grid-cols-1 gap-3 text-sm" id="trust-items"></div>
        </div>
      </div>
    </section>

    <section id="areas" class="py-16">
      <div class="mx-auto w-full max-w-6xl px-4 lg:px-8">
        <h2 id="areas-title" class="font-serif text-3xl font-bold text-brand-navy dark:text-slate-100"></h2>
        <p id="areas-subtitle" class="mt-3 max-w-3xl text-slate-600 dark:text-slate-300"></p>
        <div id="practice-areas-grid" class="mt-8 grid items-stretch gap-6 md:grid-cols-2 xl:grid-cols-3"></div>
      </div>
    </section>

    <section id="why-us" class="border-y border-slate-200 bg-white py-16 transition-colors dark:border-slate-800 dark:bg-slate-900">
      <div class="mx-auto w-full max-w-6xl px-4 lg:px-8">
        <h2 id="why-title" class="font-serif text-3xl font-bold text-brand-navy dark:text-slate-100"></h2>
        <ul id="why-bullets" class="mt-8 grid gap-5 md:grid-cols-2"></ul>
      </div>
    </section>

    <section id="testimonials" class="py-16">
      <div class="mx-auto w-full max-w-6xl px-4 lg:px-8">
        <h2 id="testimonials-title" class="font-serif text-3xl font-bold text-brand-navy dark:text-slate-100"></h2>
        <div id="testimonials-grid" class="mt-8 grid gap-5 md:grid-cols-2 xl:grid-cols-3"></div>
      </div>
    </section>

    <section class="border-y border-slate-200 bg-white py-16 transition-colors dark:border-slate-800 dark:bg-slate-900">
      <div class="mx-auto max-w-4xl px-4 text-center lg:px-8">
        <h2 id="cta-title" class="font-serif text-3xl font-bold text-brand-navy dark:text-slate-100"></h2>
        <p id="cta-subtitle" class="mx-auto mt-3 max-w-2xl text-slate-600 dark:text-slate-300"></p>
        <a id="cta-button" href="#contact" class="mt-6 inline-block rounded-xl bg-brand-navy px-5 py-3 text-sm font-semibold text-white transition hover:opacity-95 whitespace-normal text-center" data-scroll></a>
      </div>
    </section>

    <section id="contact" class="py-16">
      <div class="mx-auto grid w-full max-w-6xl gap-8 px-4 lg:grid-cols-[minmax(0,1fr)_minmax(300px,360px)] lg:px-8">
        <div>
          <h2 id="contact-title" class="font-serif text-3xl font-bold text-brand-navy dark:text-slate-100"></h2>
          <p id="contact-subtitle" class="mt-3 text-slate-600 dark:text-slate-300"></p>

          <form id="contactForm" class="mt-8 space-y-4" novalidate>
            <div>
              <label id="label-name" for="name" class="mb-2 block text-sm font-semibold text-slate-700 dark:text-slate-200"></label>
              <input id="name" name="name" required class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-800 outline-none ring-brand-gold/40 transition focus:ring-4 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-100">
              <div class="mt-1 min-h-5 text-sm text-red-600" id="error-name" aria-live="polite"></div>
            </div>

            <div>
              <label id="label-email" for="email" class="mb-2 block text-sm font-semibold text-slate-700 dark:text-slate-200"></label>
              <input id="email" name="email" type="email" required class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-800 outline-none ring-brand-gold/40 transition focus:ring-4 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-100">
              <div class="mt-1 min-h-5 text-sm text-red-600" id="error-email" aria-live="polite"></div>
            </div>

            <div>
              <label id="label-phone" for="phone" class="mb-2 block text-sm font-semibold text-slate-700 dark:text-slate-200"></label>
              <input id="phone" name="phone" required class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-800 outline-none ring-brand-gold/40 transition focus:ring-4 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-100">
              <div class="mt-1 min-h-5 text-sm text-red-600" id="error-phone" aria-live="polite"></div>
            </div>

            <div>
              <label id="label-message" for="message" class="mb-2 block text-sm font-semibold text-slate-700 dark:text-slate-200"></label>
              <textarea id="message" name="message" rows="5" required class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-800 outline-none ring-brand-gold/40 transition focus:ring-4 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-100"></textarea>
              <div class="mt-1 min-h-5 text-sm text-red-600" id="error-message" aria-live="polite"></div>
            </div>

            <div>
              <button id="contact-submit" type="submit" class="rounded-xl bg-brand-navy px-5 py-3 text-sm font-semibold text-white transition hover:opacity-95 whitespace-normal text-center"></button>
            </div>
          </form>
        </div>

        <aside class="rounded-2xl border border-slate-200 bg-white p-6 shadow-card transition-colors dark:border-slate-800 dark:bg-slate-900 lg:self-start">
          <h3 id="office-title" class="text-xl font-bold text-brand-navy dark:text-slate-100">Office</h3>
          <div class="mt-4 space-y-2 text-sm text-slate-600 dark:text-slate-300">
            <p id="footer-address"></p>
            <p id="footer-hours"></p>
            <p id="footer-phone"></p>
            <p id="footer-email"></p>
          </div>
        </aside>
      </div>
    </section>
  </main>

  <footer class="border-t border-slate-200 bg-stone-50 transition-colors dark:border-slate-800 dark:bg-slate-950">
    <div class="mx-auto flex w-full max-w-6xl flex-col gap-3 px-4 py-8 text-sm text-slate-500 lg:flex-row lg:items-center lg:justify-between lg:px-8">
      <p id="footer-disclaimer"></p>
      <small>© <span id="year"></span> Nelson, Murdock &amp; Page</small>
    </div>
  </footer>

  <script src="/assets/js/main.js" defer></script>
</body>
</html>
